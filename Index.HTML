<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Benefits Finder</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600;1,700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
--gold: #A8D4F5;
--gold-light: #C8E6FF;
--gold-pale: rgba(168,212,245,0.13);
--gold-border: rgba(168,212,245,0.30);
--navy: #003865;
--navy-mid: #004f8a;
--navy-dark: #001e38;
--navy-deep: #000e1c;
--white: #FFFFFF;
--muted: rgba(255,255,255,0.48);
--muted2: rgba(255,255,255,0.22);
--surface: rgba(255,255,255,0.042);
--surface-h: rgba(255,255,255,0.075);
--border: rgba(255,255,255,0.085);
--fi-col: #A8D4F5;
--lf-col: #B8A9E8;
--sf-col: #A8D4F5;
--ic-col: #A8D4F5;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html, body {
height: 100%;
font-family: 'Outfit', sans-serif;
background: var(--navy-deep);
color: var(--white);
overflow: hidden;
}

.bg {
position: fixed; inset: 0; z-index: 0; pointer-events: none;
}
.bg::before {
content: '';
position: absolute; inset: 0;
background:
radial-gradient(ellipse 90% 60% at 5% 5%, rgba(0,56,101,0.85) 0%, transparent 55%),
radial-gradient(ellipse 60% 80% at 95% 95%, rgba(168,212,245,0.05) 0%, transparent 55%),
linear-gradient(170deg, #001e38 0%, #000e1c 100%);
}
.bg::after {
content: '';
position: absolute; inset: 0;
background-image: repeating-linear-gradient(
-45deg,
transparent 0px, transparent 28px,
rgba(255,255,255,0.012) 28px, rgba(255,255,255,0.012) 29px
);
}
.bg-orb {
position: absolute;
border-radius: 50%;
filter: blur(90px);
animation: orbDrift 14s ease-in-out infinite;
}
.orb1 {
width: 560px; height: 560px;
background: radial-gradient(circle, rgba(168,212,245,0.08), transparent 68%);
top: -160px; right: -140px;
}
.orb2 {
width: 420px; height: 420px;
background: radial-gradient(circle, rgba(0,79,138,0.28), transparent 68%);
bottom: -100px; left: -100px;
animation-delay: -7s;
}
@keyframes orbDrift {
0%,100% { transform: translate(0,0) scale(1); }
50% { transform: translate(18px,-18px) scale(1.04); }
}

.stage {
position: relative; z-index: 1;
height: 100vh;
display: flex; align-items: center; justify-content: center;
padding: 20px;
}

.panel {
width: 100%; max-width: 700px;
max-height: 96vh;
overflow-y: auto;
scrollbar-width: none;
}
.panel::-webkit-scrollbar { display: none; }

.screen { display: none; }
.screen.active {
display: block;
animation: screenIn 0.52s cubic-bezier(0.22,1,0.36,1) forwards;
}
@keyframes screenIn {
from { opacity:0; transform: translateY(22px) scale(0.985); }
to { opacity:1; transform: translateY(0) scale(1); }
}

.card {
background: rgba(0,24,52,0.6);
border: 1px solid var(--border);
border-radius: 26px;
padding: 50px 54px;
backdrop-filter: blur(22px);
box-shadow:
inset 0 1px 0 rgba(255,255,255,0.06),
0 40px 90px rgba(0,0,0,0.55),
0 0 0 1px rgba(168,212,245,0.03);
}

/* ── SPLASH ── */
.eyebrow {
display: inline-flex; align-items: center; gap: 10px;
font-size: 10px; font-weight: 700;
letter-spacing: 3px; text-transform: uppercase;
color: var(--gold); margin-bottom: 22px;
}
.eyebrow-line {
display: block; width: 30px; height: 2px;
background: var(--gold); border-radius: 2px;
}

.splash-title {
font-family: 'Cormorant Garamond', serif;
font-size: clamp(44px, 7vw, 68px);
font-weight: 700;
line-height: 1.0;
color: var(--white);
letter-spacing: -0.5px;
margin-bottom: 18px;
}
.splash-title em { font-style: italic; color: var(--gold); }

.splash-sub {
font-size: 15px; font-weight: 400;
color: var(--muted); line-height: 1.7;
max-width: 430px; margin-bottom: 40px;
}

.result-preview {
display: flex; gap: 10px; flex-wrap: wrap;
margin-bottom: 44px;
}
.rp-chip {
display: flex; align-items: center; gap: 8px;
background: var(--surface);
border: 1px solid var(--border);
border-radius: 100px;
padding: 8px 16px;
font-size: 13px; font-weight: 500;
color: rgba(255,255,255,0.65);
}
.rp-dot {
width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}

.btn-primary {
display: inline-flex; align-items: center; gap: 10px;
background: var(--gold);
color: var(--navy-dark);
font-family: 'Outfit', sans-serif;
font-size: 16px; font-weight: 700;
padding: 16px 38px;
border-radius: 100px; border: none;
cursor: pointer;
transition: all 0.22s ease;
}
.btn-primary:hover {
background: var(--gold-light);
transform: translateY(-3px);
box-shadow: 0 14px 36px rgba(168,212,245,0.25);
}
.btn-primary svg { width:17px; height:17px; transition: transform 0.2s; }
.btn-primary:hover svg { transform: translateX(3px); }

/* ── QUESTION ── */
.q-meta {
display: flex; align-items: center; justify-content: space-between;
margin-bottom: 18px;
}
.q-label {
font-size: 10px; font-weight: 700;
letter-spacing: 2.5px; text-transform: uppercase;
color: var(--gold);
}
.q-dots { display: flex; gap: 7px; align-items: center; }
.qdot {
width: 7px; height: 7px; border-radius: 50%;
background: var(--muted2);
transition: all 0.3s ease; flex-shrink: 0;
}
.qdot.done { background: var(--gold); opacity: 0.5; }
.qdot.active {
background: var(--gold);
width: 22px; border-radius: 4px;
box-shadow: 0 0 8px rgba(168,212,245,0.55);
}

.prog-track {
height: 3px;
background: rgba(255,255,255,0.07);
border-radius: 3px;
margin-bottom: 34px; overflow: hidden;
}
.prog-fill {
height: 100%;
background: linear-gradient(90deg, var(--gold), var(--gold-light));
border-radius: 3px;
transition: width 0.55s cubic-bezier(0.4,0,0.2,1);
}

.q-text {
font-family: 'Cormorant Garamond', serif;
font-size: clamp(22px, 4vw, 30px);
font-weight: 600;
color: var(--white);
line-height: 1.25;
margin-bottom: 30px;
letter-spacing: -0.2px;
}

.options { display: grid; gap: 10px; }

.opt {
display: flex; align-items: center; gap: 16px;
width: 100%;
background: var(--surface);
border: 1.5px solid var(--border);
border-radius: 14px;
padding: 16px 20px;
cursor: pointer;
transition: all 0.2s ease;
text-align: left;
color: var(--white);
font-family: 'Outfit', sans-serif;
font-size: 15px; font-weight: 500;
line-height: 1.4;
}
.opt:hover:not(:disabled) {
background: var(--surface-h);
border-color: var(--gold-border);
transform: translateX(5px);
}
.opt:disabled { cursor: default; }
.opt.chosen {
background: var(--gold-pale);
border-color: var(--gold);
}
.opt.chosen .opt-icon { background: var(--gold); }

.opt-icon {
flex-shrink: 0;
font-size: 20px;
width: 42px; height: 42px;
border-radius: 10px;
background: rgba(255,255,255,0.06);
display: flex; align-items: center; justify-content: center;
transition: all 0.2s ease;
}

/* ── RESULTS ── */
.result-badge {
display: inline-flex; align-items: center; gap: 10px;
border-radius: 100px;
padding: 8px 20px;
font-size: 11px; font-weight: 700;
letter-spacing: 2px; text-transform: uppercase;
margin-bottom: 24px;
border: 1px solid;
}
.result-badge.fi { background: rgba(168,212,245,0.12); border-color: rgba(168,212,245,0.35); color: var(--fi-col); }
.result-badge.lf { background: rgba(184,169,232,0.12); border-color: rgba(184,169,232,0.35); color: var(--lf-col); }
.result-badge.sf { background: rgba(168,212,245,0.12); border-color: rgba(168,212,245,0.35); color: var(--sf-col); }
.result-badge.ic { background: rgba(168,212,245,0.12); border-color: rgba(168,212,245,0.35); color: var(--ic-col); }

.result-title {
font-family: 'Cormorant Garamond', serif;
font-size: clamp(36px, 5.5vw, 54px);
font-weight: 700; line-height: 1.05;
color: var(--white); margin-bottom: 16px;
}
.result-title em { font-style: italic; }
.result-title.fi em { color: var(--fi-col); }
.result-title.lf em { color: var(--lf-col); }
.result-title.sf em { color: var(--sf-col); }
.result-title.ic em { color: var(--ic-col); }

.result-why {
font-size: 15px; color: var(--muted);
line-height: 1.7; max-width: 520px;
margin-bottom: 36px;
}

.pros-label {
font-size: 10px; font-weight: 700;
letter-spacing: 2.5px; text-transform: uppercase;
color: var(--muted); margin-bottom: 14px;
}
.pros-grid {
display: grid; grid-template-columns: 1fr 1fr;
gap: 10px; margin-bottom: 32px;
}
.pro-item {
display: flex; align-items: flex-start; gap: 12px;
background: var(--surface);
border: 1px solid var(--border);
border-radius: 13px;
padding: 14px 16px;
}
.pro-icon {
flex-shrink: 0; font-size: 18px;
width: 34px; height: 34px;
border-radius: 9px;
display: flex; align-items: center; justify-content: center;
}
.pro-icon.fi { background: rgba(168,212,245,0.12); }
.pro-icon.lf { background: rgba(184,169,232,0.12); }
.pro-icon.sf { background: rgba(168,212,245,0.12); }
.pro-icon.ic { background: rgba(168,212,245,0.12); }
.pro-text { font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.8); line-height: 1.4; }

.divider { height: 1px; background: var(--border); margin: 28px 0; }

.cta-box {
background: linear-gradient(135deg, var(--gold-pale), rgba(0,56,101,0.25));
border: 1px solid var(--gold-border);
border-radius: 18px;
padding: 26px 30px;
margin-bottom: 28px;
}
.cta-box p { font-size: 15px; line-height: 1.65; color: rgba(255,255,255,0.82); }
.cta-box strong { color: var(--gold); font-weight: 700; }

.result-actions { display: flex; justify-content: center; }

.btn-ghost {
display: inline-flex; align-items: center; gap: 10px;
background: transparent;
border: 1.5px solid var(--gold-border);
color: var(--gold);
font-family: 'Outfit', sans-serif;
font-size: 14px; font-weight: 600;
padding: 13px 28px;
border-radius: 100px; cursor: pointer;
transition: all 0.2s ease;
}
.btn-ghost:hover { background: var(--gold-pale); border-color: var(--gold); }
.btn-ghost svg { width:15px; height:15px; }
</style>

</head>
<body>

<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>
</div>

<div class="panel">
